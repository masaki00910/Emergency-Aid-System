steps:
# Build the container image with increased resources
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/disaster-frontend:latest', '.']
  timeout: '1800s'  # 30分のタイムアウト

# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/disaster-frontend:latest']
  timeout: '600s'

# Deploy container image to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args: 
  - 'run'
  - 'deploy'
  - 'disaster-frontend'
  - '--image'
  - 'gcr.io/$PROJECT_ID/disaster-frontend:latest'
  - '--region'
  - 'asia-northeast1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--port'
  - '3000'
  - '--memory'
  - '4Gi'
  - '--cpu'
  - '2'
  - '--timeout'
  - '3600'
  - '--max-instances'
  - '100'
  timeout: '600s'

options:
  # 高性能マシンを使用
  machineType: 'E2_HIGHCPU_8'
  # ディスクサイズを増加
  diskSizeGb: 100
  # ログ設定
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'  # 全体で1時間のタイムアウト